<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>随机图片瀑布流</title>
  <style>
    :root {
      --bg: #f5efe6;
      --paper: #fffaf3;
      --ink: #2f2a24;
      --muted: #7a6f63;
      --line: #d8cfc4;
      --accent: #b45309;
      --desktop-columns: 5;
      --gap: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(1200px 600px at 10% -20%, #f8e9d4 0%, transparent 60%),
        radial-gradient(1000px 500px at 90% -30%, #efe3d2 0%, transparent 60%),
        var(--bg);
      font-family: "Noto Serif SC", "Microsoft YaHei", "PingFang SC", serif;
    }

    .wrap {
      width: min(1200px, 92vw);
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
    }

    .title {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.2;
      letter-spacing: 0.5px;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-family: "Consolas", "Courier New", monospace;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    }

    .primary {
      border-color: #d78e50;
      background: linear-gradient(135deg, #c86a1d, #a54807);
      color: #fff;
    }

    .stats {
      color: var(--muted);
      font-size: 12px;
      font-family: "Consolas", "Courier New", monospace;
    }

    .masonry {
      column-count: var(--desktop-columns);
      column-gap: var(--gap);
    }

    .card {
      break-inside: avoid;
      margin: 0 0 var(--gap);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: 0 12px 20px rgba(40, 34, 26, 0.08);
      opacity: 0;
      transform: translateY(14px);
      animation: rise 0.4s ease forwards;
    }

    .card img {
      width: 100%;
      display: block;
      background: #ebe3d8;
    }

    .card p {
      margin: 0;
      padding: 8px 10px;
      color: var(--muted);
      font-size: 11px;
      font-family: "Consolas", "Courier New", monospace;
    }

    .sentinel {
      margin: 16px 0;
      height: 20px;
    }

    .notice {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 14px;
    }

    @keyframes rise {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1200px) {
      .masonry {
        column-count: 4;
      }
    }

    @media (max-width: 900px) {
      .masonry {
        column-count: 3;
      }
    }

    @media (max-width: 640px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .actions {
        width: 100%;
        justify-content: flex-start;
      }

      .masonry {
        column-count: 1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div>
        <h1 class="title">随机图片瀑布流</h1>
        <p class="subtitle">少看一点</p>
      </div>
      <div class="actions">
        <button id="reload" class="primary">刷新全部</button>
        <button id="loadMore">再加载 20 张</button>
        <span class="stats" id="stats">已加载: 0</span>
      </div>
    </header>

    <main>
      <section id="masonry" class="masonry" aria-live="polite"></section>
      <div id="sentinel" class="sentinel" aria-hidden="true"></div>
      <p id="notice" class="notice">向下滚动自动加载更多图片</p>
    </main>
  </div>

  <script>
    const API_BASE = "https://boudoir.ortlinde.com";
    const API_JSON = API_BASE + "/random?json=1";
    const BATCH_SIZE = 20;

    const masonry = document.getElementById("masonry");
    const stats = document.getElementById("stats");
    const notice = document.getElementById("notice");
    const sentinel = document.getElementById("sentinel");
    const loadMoreBtn = document.getElementById("loadMore");
    const reloadBtn = document.getElementById("reload");

    let loaded = 0;
    let isLoading = false;

    function updateStats() {
      stats.textContent = "已加载: " + loaded;
    }

    async function fetchImageUrl() {
      try {
        const res = await fetch(API_JSON + "&t=" + Date.now() + Math.random(), {
          cache: "no-store"
        });
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        const data = await res.json();
        if (data && data.url) {
          return data.url;
        }
      } catch (_) {
      }
      return API_BASE + "/random?t=" + Date.now() + Math.random();
    }

    function createCard(url) {
      const card = document.createElement("article");
      card.className = "card";

      const img = document.createElement("img");
      img.loading = "lazy";
      img.decoding = "async";
      img.alt = "随机图片";
      img.src = url;
      img.onerror = () => {
        img.src = API_BASE + "/random?t=" + Date.now() + Math.random();
      };

      const text = document.createElement("p");
      text.textContent = new URL(url, location.href).host;

      card.appendChild(img);
      card.appendChild(text);
      return card;
    }

    async function appendBatch(count) {
      if (isLoading) {
        return;
      }

      isLoading = true;
      notice.textContent = "加载中...";

      for (let i = 0; i < count; i += 1) {
        const url = await fetchImageUrl();
        masonry.appendChild(createCard(url));
        loaded += 1;
        updateStats();
      }

      isLoading = false;
      notice.textContent = "向下滚动自动加载更多图片";
    }

    async function reloadAll() {
      masonry.innerHTML = "";
      loaded = 0;
      updateStats();
      await appendBatch(BATCH_SIZE);
    }

    loadMoreBtn.addEventListener("click", () => {
      appendBatch(BATCH_SIZE);
    });

    reloadBtn.addEventListener("click", () => {
      reloadAll();
    });

    const observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        appendBatch(BATCH_SIZE);
      }
    }, {
      rootMargin: "300px"
    });

    observer.observe(sentinel);
    reloadAll();
  </script>
</body>
</html>
